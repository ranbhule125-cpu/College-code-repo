<html>
<head>
    <title>Coffee Corner</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            background-color: #4e342e;
            color: white;
            padding: 15px;
        }

        .menu-container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }

        .item {
            display: inline-block;
            width: 250px;
            background-color: white;
            margin: 15px;
            padding: 10px;
            border: 1px solid #ccc;
        }

        img {
            width: 100%;
            height: 180px;
        }

        h3 {
            margin: 10px 0;
        }

        .price {
            color: brown;
            font-weight: bold;
        }

        button {
            padding: 5px 10px;
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>☕ Coffee Corner Menu</h1>

<div class="menu-container">

    <div class="item">
        <img src="coffee1.jpg">
        <h3>Espresso</h3>
        <p>Strong black coffee</p>
        <p class="price">₹80</p>
        <button onclick="order('Espresso')">Order</button>
    </div>

    <div class="item">
        <img src="coffee2.jpg">
        <h3>Cappuccino</h3>
        <p>Creamy milk coffee</p>
        <p class="price">₹120</p>
        <button onclick="order('Cappuccino')">Order</button>
    </div>

    <div class="item">
        <img src="coffee3.jpg">
        <h3>Latte</h3>
        <p>Smooth and light</p>
        <p class="price">₹130</p>
        <button onclick="order('Latte')">Order</button>
    </div>

    <div class="item">
        <img src="coffee4.jpg">
        <h3>Cold Coffee</h3>
        <p>Chilled and refreshing</p>
        <p class="price">₹140</p>
        <button onclick="order('Cold Coffee')">Order</button>
    </div>

</div>

<script>
function order(item){
    alert(item + " ordered successfully!");
}
</script>

</body>
</html>
